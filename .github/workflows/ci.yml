name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[langchain,dev]"

      - name: Ruff
        run: ruff check src tests benchmarks

      - name: Mypy
        run: mypy src/eda_parse

      - name: Pytest
        run: pytest -ra --cov=eda_parse --cov-report=term-missing

      - name: Workflow testbench
        run: python benchmarks/workflow_testbench.py

      - name: Timing diagnosis task validation
        run: python benchmarks/timing_diagnosis/run.py validate
